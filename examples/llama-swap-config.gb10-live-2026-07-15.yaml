  # ===========================================================================
  # AUTOBUILD COACH — base Gemma 4 26B-A4B-IT (UD-Q4_K_XL).
  #
  # Filed by TASK-HMIG-013 (Stage 1 of the two-stage substrate strategy
  # adopted in commit 86cf71be for the 2026-06-15 Anthropic-SDK-subscription
  # cutover deadline). Exxact's DGX Spark agentic benchmark scored base
  # gemma4:26b 17/17 on JSON-discipline / tool-calling / argument-validation
  # tests at 52.7 tok/s — exactly the substrate posture the Coach role needs
  # to close the F17 verdict-emission gap that qwen36-workhorse exhibits at
  # ~67 % reliability (per run-5 sample) and ~602 chars-of-prose on run 6
  # turn 1 under Shape A's simpler fenced-JSON contract. Substrate problem,
  # not contract problem — model swap, not parser change.
  #
  # IMPORTANT: this is the BASE Gemma 4 26B-A4B-IT (Unsloth's pre-quantised
  # UD-Q4_K_XL from huggingface.co/unsloth/gemma-4-26B-A4B-it-GGUF), NOT
  # gemma4-tutor (fine-tuned for Socratic GCSE dialogue, wrong posture for
  # terse JSON Coach output) and NOT architect-agent (fine-tuned for DDD
  # thinking, also wrong posture). The Exxact 17/17 score was on the BASE
  # model — fine-tuned variants do not inherit that JSON-discipline.
  #
  # Coach-posture parameters: --temp 0.1 --top-p 0.9 (deterministic JSON
  # emission), --jinja with model's embedded IT chat template (no role-
  # specific .jinja file — architect's gemma4-thinking.jinja and tutor's
  # gemma4-tutor.jinja encode the wrong personas). --reasoning off is
  # load-bearing: base Gemma 4 IT is a hybrid reasoning model and its
  # embedded chat template defaults to emitting chain-of-thought into
  # message.reasoning_content with an empty message.content (finish_reason
  # 'length' on short max_tokens budgets). Coach turns must emit a fenced
  # JSON block directly into message.content — any pre-emit reasoning is
  # exactly the F17 prose-before-JSON failure mode we are trying to close.
  # --ctx-size 65536 matches outgoing architect's ctx so KV-footprint stays
  # budget-neutral. See findings §9.13 "Reasoning-off lesson".
  #
  # ROUTING NOTE: the legacy `coach` alias remains on qwen36-workhorse for
  # backwards compatibility. TASK-HMIG-013 AC-004 ships an orchestrator-side
  # per-role override (LangGraphHarness in guardkitfactory) that emits
  # model=gemma4:26b explicitly for Coach turns. Once that lands, the `coach`
  # alias can move here and be removed from workhorse.
  #
  # See findings §9.13 (this revision's full deployment + rollback recipe).
  "gemma4-coach":
    # 2026-06-06 (TASK-FIX-COACHBUDG01 follow-on): bumped --ctx-size
    # 65536 → 131072 to give Coach turns enough room to carry the full
    # task plan + Player report + reasoning preamble + verdict without
    # the LangGraph orchestrator running out of context mid-loop. Latest
    # autobuild run ran out of context on a complex turn with ctx 65 K.
    #
    # Memory-budget protection: paired with --cache-type-k q8_0
    # --cache-type-v q8_0 so the doubled-ctx × half-precision KV nets
    # to roughly memory-neutral vs the prior shape (steady-state
    # ~107 GB used / 121 GB total observed under load before this bump;
    # f16 KV at ctx 131 K would have added ~5-10 GB and risked OOM).
    # Mirrors gpt-oss-120b's historical config (`q8_0` KV + flash-attn).
    # q8 KV at q4_k_xl weights is well-validated for instruction-following
    # quality on Gemma-4-class models — acceptable trade for the ctx
    # doubling. If verdict-emission quality regresses under load, revert
    # to ctx 65 K + f16 KV (single config edit + restart).
    #
    # 2026-06-07 (run-11 F23A forensics): trimmed --ctx-size 131072 →
    # 98304 after run-11 OOM-killed by the kernel mid-Coach at ~19 min
    # of sustained reasoning. journalctl --user -u llama-swap.service
    # cites it verbatim: "A process of this unit has been killed by the
    # OOM killer" / "Failed with result 'oom-kill'" at 2026-06-07
    # 14:30:43 BST (= 13:30:43 UTC, ~1110 s into Coach LLM invocation,
    # matching the orchestrator's `Connection error` traceback in run-11
    # log line 350). KV at ctx 131 K + q8 + sustained reasoning growth
    # exceeded the ~30 GB headroom under live load (GUI apps,
    # forge-autobuild-runner, langgraph, all 4 always-on models). 98304
    # gives back ~25% KV cost while still being 50% more capacity than
    # the original 65 K that exhausted in earlier runs. Matches the
    # qwen3-coder-30b ctx (`98304`) precedent. Rollback recipe: revert
    # to ctx 131 K + drop competing user services (forge-autobuild-runner,
    # langgraph) before the run + close GB10 desktop GUI apps. See
    # `docs/state/TASK-REV-HMIG/run-11-f23-forensics-handoff.md` §9.
    cmd: >
      /home/richardwoollcott/llama.cpp-new/build/bin/llama-server
      --port ${PORT}
      --host 0.0.0.0
      --model /opt/llama-swap/models/gemma4-coach/gemma-4-26B-A4B-it-UD-Q4_K_XL.gguf
      --alias gemma4-coach
      --ctx-size 98304
      --batch-size 2048
      --ubatch-size 2048
      --threads 16
      -ngl 999
      --no-mmap
      --flash-attn on
      --cache-type-k q8_0
      --cache-type-v q8_0
      --jinja
      --reasoning auto
      --temp 0.1
      --top-p 0.9
      -np 1
    checkEndpoint: /health
    ttl: 0
    concurrencyLimit: 2
    aliases:
      - "gemma4:26b"
      - "gemma-4-26b-a4b-it"
      - "autobuild-coach"
      - "coach_test"

