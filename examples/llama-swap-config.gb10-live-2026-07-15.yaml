  # ===========================================================================
  # AUTOBUILD COACH CANDIDATE — Gemma 4 31B DENSE QAT (q4_0).
  #
  # Filed by TASK-OPS-COACH31B (2026-06-08). Runs 12-14 proved the current
  # Coach substrate (gemma4-coach = base Gemma 4 26B-A4B-IT, an MoE with only
  # ~3.8B ACTIVE params) cannot organise agentic reasoning to a fenced-JSON
  # verdict — run-14 turn-1 produced 49,720 chars of reasoning_content and NO
  # verdict in ~45 min. Three non-hardware levers were exhausted: route-level
  # GBNF grammar (Path 1A, no-op — llama.cpp bypasses --grammar-file when a
  # request carries `tools`, and the deepagents Coach always sends tools),
  # decisive-prompt + self-check (Path 1B, made it worse), and more time
  # (--sdk-timeout 3600, also worse). The wall is the model's ACTIVE reasoning
  # capacity, not the scaffolding.
  #
  # This route is the no-new-hardware capacity fix: google/gemma-4-31B-it-qat-
  # q4_0-gguf is a DENSE 30.7B model (30.7B active vs the MoE's 3.8B) at
  # quantization-aware-training int4 quality, 17.65 GB on disk (gemma-4-31B
  # _q4_0-it.gguf) — ~= the current Coach's 17.0 GB footprint. 256K context.
  #
  # POSTURE: identical to gemma4-coach so the substrate is the only variable
  # under test — base Gemma-4 IT EMBEDDED chat template via --jinja (NO
  # --chat-template-file: the GGUF ships the base IT template; architect's
  # gemma4-thinking.jinja forces extra deliberation, the opposite of what the
  # Coach needs), --reasoning auto, --temp 0.1 --top-p 0.9, q8_0 KV. NO
  # --grammar-file (Path 1A is reverted/no-op for tool-bound Coach agents).
  #
  # MEMORY / CTX — the F20↔F23A tension (tuned empirically on the GB10):
  #  * runs 15+16 (ctx 98304, FULL coach31 fleet incl. qwen-graphiti ~25.6 GB):
  #    F23A global OOM — no GPU/unified headroom for g31's KV on a big Coach
  #    prompt. Fixed by trimming the `coach31` matrix.set to "qw & g31" (drop
  #    qg+ne+dl, ~26 GB freed) + running autobuild with `--no-context`.
  #  * run-17 (ctx 65536, minimal fleet): NO OOM (memory fix worked) but F20
  #    context overflow — HTTP 400 "request (66687 tokens) exceeds the available
  #    context size (65536)". The 41-file Player payload produced a 66.7 K-token
  #    Coach prompt. 65536 was too small.
  # 2026-06-09: set --ctx-size 98304 (covers the 66.7 K prompt with margin;
  # run-15-proven value). Now memory-safe because qg is no longer co-resident
  # (qw ~25.6 GB + g31 ~25 GB static, peaks ~48 GB under a large-prompt run →
  # ~89 GB total, ~35 GB headroom). NOTE g31's RSS BLOATS under a long Coach
  # loop (observed 48.5 GB at ctx 65536 while processing the 66.7 K prompt) —
  # restart g31 (config reload) clears it. If a bigger payload (e.g. run-16's
  # 71 files ≈ 115 K tokens) re-triggers F20, the real fix is capping the Coach
  # prompt (orchestrator code / D-3), NOT endless ctx growth (which re-arms
  # F23A). 12B dense QAT remains the lower-footprint fallback.
  #
  # NOT in `preload`, NOT in `all`, NOT in the keepalive allowlist — loads
  # ONLY when `gemma4:31b` is explicitly requested (via the `coach31` matrix
  # set below), so adding this route does not disturb the default fleet.
  # Rollback: delete this block + the `g31` matrix.var + the `coach31` set.
  # See TASK-OPS-COACH31B + run-14 artifacts.
  "gemma4-31b":
    cmd: >
      /home/richardwoollcott/llama.cpp-new/build/bin/llama-server
      --port ${PORT}
      --host 0.0.0.0
      --model /opt/llama-swap/models/gemma4-31b-coach/gemma-4-31B_q4_0-it.gguf
      --alias gemma4-31b
      --ctx-size 98304
      --batch-size 2048
      --ubatch-size 2048
      --threads 16
      -ngl 999
      --no-mmap
      --flash-attn on
      --cache-type-k q8_0
      --cache-type-v q8_0
      --jinja
      --reasoning auto
      --temp 0.1
      --top-p 0.9
