# Default: original 5-model concurrent set (workhorse + 4 others).
# Coder is defined but NOT preloaded — on-demand only, evicts workhorse
# when a coder alias (e.g. autobuild-coder) is requested.
matrix:
  vars:
    qg: qwen-graphiti
    ne: nomic-embed
    qw: qwen36-workhorse
    qc: qwen3-coder-30b
    gt: gemma4-tutor
    aa: architect-agent
    gc: gemma4-coach
    cfv3: coach-ft-v3
    tc: tutor-coach
    g31: gemma4-31b
    go: gpt-oss-120b
    g26: gemma4-26b
    dl: granite-docling
    gv: granite-vision-4-1-4b
    gv33: granite-vision-3-3-2b
    em: embed
    pk: parakeet-tdt-0.6b-v3
    qt: qwen3-tts-0.6b
  sets:
    # 2026-07-05 (voice-unified): `pk` (Parakeet STT, ~5 GB) joins EVERY set
    # so the persistent audio group is never evicted by a set switch and a
    # voice request never evicts the active workload. Even the tight
    # exclusive sets (coach31/autobuild_go/po_eval, ~95-105 GB peak) absorb
    # it: worst case ~100-110 GB of 121 GB. If a future exclusive set truly
    # cannot spare ~5 GB, drop pk from THAT set knowingly (voice requests
    # would then evict the exclusive workload — never do it silently).
    # 2026-05-30: tutor moved out of `all` to a dedicated `tutor` set.
    # `all` now holds the always-on family (qg + ne + qw + aa, ~80 GB) plus
    # docling on-demand (~11 GB resident when loaded). Architect-agent took
    # tutor's preload slot (see entry comments + findings §9.9).
    #
    # docling lives in `all` only. It must NOT be in the coder sets: when it
    # was (`qc & dl`, `qcn & dl`), the solver could satisfy a docling request
    # via a coder set and would LOAD A CODER to serve docling — thrashing
    # docling's lifecycle (exit 1 / swapState wedge) so :9000 hung while the
    # container was healthy. docling is now a normal `all` member: co-resident
    # with the family, evicted only when an exclusive coder runs (lpa
    # extraction and autobuild are then mutually exclusive — acceptable).
    #
    # granite-vision-4-1-4b (gv) lives in `lpa` ONLY, NOT in `all`. The
    # initial design had gv in `all` for on-demand co-residency (assumed
    # ~12-15 GB footprint); first-load measured 2026-05-30 showed it
    # actually consumes ~26 GB resident, which pushed `all` + gv to ~106 GB
    # and crossed the §9.4 freeze threshold. So gv is exclusively in `lpa`,
    # making it a mutually-exclusive workload like the (removed) coder-next:
    # requesting gv switches to the `lpa` set, evicts qg + aa + dl, keeps
    # qw + ne. After ttl 1800 idle, gv unloads and the family revives on
    # the next probe. See findings §9.10 (+ §9.11 if added).
    # 2026-06-06 (TASK-HMIG-013): rotated `aa` → `gc`. gemma4-coach (base
    # Gemma 4 26B-A4B-IT UD-Q4_K_XL) takes architect-agent's always-on slot
    # to close the F17 Coach verdict-emission gap before the 2026-06-15
    # cutover. Architect-agent moves to on-demand via the new `arch` set
    # below — same pattern as `tutor`. See findings §9.13.
    # 2026-06-21: rotated gc → cfv3 (coach-ft-v3 — fine-tuned bundle-format Coach;
    # same 26B-A4B footprint as gemma4-coach → memory-neutral). See RESULTS-coach-v3.md.
    # 2026-07-12 (Lane A specialist-deploy, Rich's in-session call): `gc` JOINS
    # `all` and `qg` LEAVES it. Before this, NO set held both qw and gc, so every
    # factory Player↔Coach call pair (007/008 headless drives, autobuild turns)
    # switched sets — evicting/reloading ~20 GB each way, and twice tonight a
    # mid-switch request starved >30 min behind interleaved s2s traffic (both
    # gate drives died on the wall clock; gemma4-coach slot idle throughout).
    # Co-residency removes the swap from the factory hot path entirely.
    # Memory: all was ~80 GB; − qg (~25.6 GB, see coach31 note) + gc (~20 GB
    # incl. 98K q8 KV, see po_eval sizing) ≈ ~75 GB of 121 GB. cfv3 stays.
    # qg moves to the on-demand `graphiti` set below (tutor/arch pattern) —
    # graphiti extraction becomes mutually exclusive with the factory family.
    # Keepalive allowlist unaffected (R-G5: it probes the tutor set only).
    # Rollback: config.yaml.bak-20260712-pre-gc-coresident.
    all: "ne & qw & gc & cfv3 & dl & em & pk & qt"
    # 2026-07-12 (same change): qwen-graphiti on-demand set — requesting qg
    # evicts the factory family (loud, documented; same pattern as tutor/arch).
    graphiti: "qg & ne & em & pk & qt"
    # 2026-06-08 (TASK-OPS-COACH31B): coach31 set — swaps the Coach slot gc → g31
    # (Gemma 4 31B dense QAT). Requesting `gemma4:31b` switches to this set,
    # EVICTING gemma4-coach. The keepalive timer probes gemma4-coach every 5 min,
    # which would revive gc ON TOP of g31 → OOM/freeze; for any g31 session you
    # MUST first pause it:  sudo systemctl stop llama-swap-keepalive.timer
    # (re-enable after:     sudo systemctl start llama-swap-keepalive.timer).
    #
    # 2026-06-09 (runs 15+16 F23A → GPU/unified-memory exhaustion): trimmed the
    # set from "qg & ne & qw & g31 & dl" to MINIMAL "qw & g31" (Player + Coach
    # ONLY). nvidia-smi showed qwen-graphiti alone holds ~25.6 GB GPU; runs 15/16
    # OOM-killed g31 because the full coach31 fleet left no headroom for g31's KV
    # to grow on a large Coach prompt (run-16: 71-file Player payload). Dropping
    # qg + ne + dl frees ~26 GB of unified memory so the dense 31B has room.
    # REQUIRED: run with `--no-context` so the orchestrator does NOT call graphiti
    # (qg) / embed (ne) mid-run — else llama-swap would switch sets and evict g31.
    # If a future run needs Graphiti context, add qg & ne back AND shrink the
    # Coach (12B QAT) or qw's ctx instead. See run-16-artifacts/README.md.
    coach31: "qw & g31 & pk & qt"
    # 2026-05-30: tutor set — `study-tutor` request loads tutor + workhorse
    # only (evicts graphiti + embed + architect + docling). Sized for short
    # tutor sessions (~45 GB resident). If a tutor session needs to survive
    # keepalive probes (5-min cadence revives the `all` family, evicting
    # tutor), pause the timer first:
    #     sudo systemctl stop llama-swap-keepalive.timer
    # Re-enable after the session. Short turns (<5 min between messages) are
    # unlikely to be hit.
    # 2026-07-05 (FEAT-APP-001): Coach slot qw → tc (tutor-coach). qwen36-workhorse
    # (reasoning) emitted non-JSON → MalformedCoachOutputError every turn + ~33-43s;
    # tutor-coach (base Gemma-4-26B, reasoning off) returns a clean CoachVerdict in
    # ~9s. Lighter footprint too (no 35B @ 131072 ctx). See the tutor-coach entry.
    tutor: "gt & tc & em & pk & qt"
    # 2026-06-06 (TASK-HMIG-013): arch set — `software-architect` /
    # `architect-agent` request loads architect + workhorse only (evicts
    # graphiti + embed + gemma4-coach + docling). Sized for /system-arch,
    # /system-design, /arch-refine, /system-plan sessions (~50 GB resident).
    # Same keepalive-eviction discipline as `tutor`: pause the timer for
    # long architect sessions. See findings §9.13.
    arch: "aa & qw & em & pk & qt"
    # 2026-05-30/31: LPA sets — granite-vision + workhorse + embed for the
    # LPA extraction pipeline (vision turns each page into markdown;
    # workhorse handles downstream structured-extraction reasoning; embed
    # for vector search). Two parallel sets, one per vision model, both
    # mutually exclusive with `all` (each evicts qg + aa + dl when loaded).
    # The LPA POC picks which vision model via DOCLING_VLM_MODEL env var:
    #   lpa     → granite-vision-4-1-4b   (~56 GB resident; per §9.11)
    #   lpa_v3  → granite-vision-3-3-2b   (~45-50 GB resident; per §9.12,
    #              fallback after 4.1-4b's page-4 EOS-collapse pattern
    #              proved un-tuneable across 7 Ashworth smokes)
    # Only one vision model loads at a time — they're substitutable. See
    # lpa-platform-poc/docs/history/lpa-extraction-e2e-smoke-4.md.
    lpa: "gv & qw & ne & em & pk & qt"
    lpa_v3: "gv33 & qw & ne & em & pk & qt"
    # 2026-05-30: coder-next removed — see findings §9.9. coder-30b remains as
    # an opt-in code-tuned alternative (requesting `autobuild-coder` evicts
    # the family for the build).
    coder_30b: "qc & pk & qt"
    # 2026-06-15: autobuild Player-upgrade experiment. GPT-OSS-120B Player +
    # gemma4-coach Coach, EXCLUSIVE — requesting `autobuild-player` / `gpt-oss-120b`
    # evicts the qg/ne/qw/dl fleet. ~95-105 GB peak / 121 GB. MUST pause the
    # keepalive timer (sudo systemctl stop llama-swap-keepalive.timer) + run
    # autobuild with `--no-context` (same discipline as coach31), else the
    # keepalive revives the fleet on top of gpt-oss → OOM.
    autobuild_go: "go & gc & pk & qt"
    # 2026-07-02 (PO Phase 0 golden-set diagnosis): po_eval set — gemma4-26b
    # (g26, the MoE base UNDER TEST) + gpt-oss-120b (go, the Coach/gate),
    # co-resident so score_golden_set.py hits BOTH without per-item swapping.
    # Same footprint as autobuild_go (~95-105 GB peak / 121 GB: go ~63 GB + a
    # 26B gemma ~20 GB + KV); evicts the qg/ne/qw/cfv3/dl fleet. Requesting
    # gemma4-26b activates this set. REQUIRES the keepalive timer paused
    # (sudo systemctl stop llama-swap-keepalive.timer) — same discipline as
    # autobuild_go/coach31 — else keepalive revives the fleet on top → OOM.
    # Rollback: delete this set + the `g26` var.
    po_eval: "go & g26 & pk & qt"

