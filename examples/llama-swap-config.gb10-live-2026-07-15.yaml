# =============================================================================
# llama-swap production config — all-llama.cpp architecture
# =============================================================================
# Port: :9000
# Memory budget (validated 2026-04-28): ~60 GB / 128 GB for the original 4 models.
# Updated 2026-05-03: added architect-agent (~17 GB). New total ~82 GB / 121 GB
# unified — comfortable, but watch GPU memory if adding a 6th model.
# Updated 2026-05-07: bumped architect-agent --ctx-size 32768 → 65536. KV cache
# delta ~+5 GB → new total ~87 GB / 121 GB unified.
# Updated 2026-06-06 (TASK-HMIG-013): rotated preload architect-agent →
# gemma4-coach (base Gemma 4 26B-A4B-IT UD-Q4_K_XL). Same Gemma 4 26B-A4B
# Q4_K_XL family + ctx 65536 as outgoing architect — net always-on RAM
# delta ≈ 0. Architect-agent moves to on-demand via the new `arch` matrix.set,
# mirroring §9.9's tutor→architect rotation. See findings §9.13.
#
# matrix.sets[all] declares all 5 models can run concurrently, so the solver
# never evicts when forwarding requests.
# hooks.on_startup.preload loads them all at boot.
# =============================================================================

healthCheckTimeout: 600
startPort: 5800
logLevel: info
globalTTL: 0           # never auto-unload on idle

models:
  # 2026-05-25: --ctx-size 32768 → 65536, -np 6 → 4, concurrencyLimit 8 → 6.
  # graphiti-core was emitting 9443-token chunks (workflow rule for the DDD
  # South West Graphiti architecture seed) that 400'd against the previous
  # ~5.6 K-per-slot ceiling (32768 / 6). New layout: 16 K per slot
  # (65536 / 4) covers the 9-12 K chunk band with headroom for
  # graphiti-core's prompt scaffolding. -np trimmed 6 → 4 to keep the KV
  # delta in budget (~+6 GB instead of ~+12-16 GB); 4 slots still absorbs
  # graphiti-core's typical 3-5-call add_episode fan-out, though a worst-
  # case 5-burst will queue briefly. concurrencyLimit 6 keeps the same
  # ~1.5× admin-probe buffer over -np. See
  # docs/research/dgx-spark/AUTOBUILD-ON-LLAMA-SWAP-findings.md §9.1.
  "qwen-graphiti":
    cmd: >
      /home/richardwoollcott/llama.cpp-new/build/bin/llama-server
      --port ${PORT}
      --host 0.0.0.0
      --model /opt/llama-swap/models/qwen2.5-14b/qwen2.5-14b-instruct-q8_0-00001-of-00004.gguf
      --alias qwen-graphiti
      --ctx-size 65536
      --batch-size 2048
      --ubatch-size 2048
      --threads 16
      -ngl 999
      --no-mmap
      --flash-attn on
      --jinja
      --temp 0.0
      -np 4
    checkEndpoint: /health
    ttl: 0
    concurrencyLimit: 6
    aliases:
      - "neuralmagic/Qwen2.5-14B-Instruct-FP8-dynamic"
      - "graphiti-llm"
      - "jarvis-router"

